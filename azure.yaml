# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: knowledge-mining

requiredVersions:
  azd: ">= 1.18.0"

metadata:
  template: knowledge-mining@1.0

hooks:
  preprovision:
    windows:
      shell: pwsh
      run: |
        $ErrorActionPreference = "Continue"
        $existing = azd env get-value ADMIN_API_KEY 2>$null
        if ($LASTEXITCODE -ne 0 -or -not $existing) {
          $key = [System.Convert]::ToBase64String([System.Security.Cryptography.RandomNumberGenerator]::GetBytes(32)).TrimEnd('=') -replace '[+/]', '-'
          azd env set ADMIN_API_KEY $key
          $env:ADMIN_API_KEY = $key
          Write-Host "Generated ADMIN_API_KEY and stored in azd env." -ForegroundColor Green
        } else {
          $env:ADMIN_API_KEY = $existing
        }
        exit 0
    posix:
      shell: sh
      run: |
        existing=$(azd env get-value ADMIN_API_KEY 2>/dev/null) || true
        if [ -z "$existing" ]; then
          key=$(openssl rand -base64 32 | tr '+/' '-' | tr -d '=')
          azd env set ADMIN_API_KEY "$key"
          export ADMIN_API_KEY="$key"
          echo "Generated ADMIN_API_KEY and stored in azd env."
        else
          export ADMIN_API_KEY="$existing"
        fi
  postprovision:
    windows:
      shell: pwsh
      run: |
        # Write azd env values to .env so scripts can read them
        Write-Host "Writing .env file..." -ForegroundColor Yellow
        azd env get-values 2>$null | ForEach-Object {
          $_ -replace '^(\w+)="(.*)"$', '$1=$2'
        } | Where-Object { $_ -match '=' -and $_ -notmatch 'WARNING' } | Set-Content -Path ".env" -Encoding utf8

        # ── Step 0: Python environment ──
        Write-Host ""
        Write-Host "Preparing Python environment..." -ForegroundColor Yellow
        if (-not (Test-Path "venv")) {
          python -m venv venv
        }
        & ./venv/Scripts/Activate.ps1
        python -m pip install --quiet --upgrade pip
        pip install --quiet -r requirements.txt

        # ── Step 1: Create AI agent ──
        Write-Host ""
        Write-Host "Setting up AI agent..." -ForegroundColor Yellow
        & ./infra/scripts/setup-agent.ps1
        if ($LASTEXITCODE -ne 0) {
          Write-Host "WARNING: Agent setup failed — you can retry later with: ./infra/scripts/setup-agent.ps1" -ForegroundColor Yellow
        }

        # ── Step 1.5: Grant API identity access to SQL ──
        Write-Host ""
        & ./infra/scripts/setup-sql-roles.ps1
        if ($LASTEXITCODE -ne 0) {
          Write-Host "WARNING: SQL role assignment failed — retry later with: ./infra/scripts/setup-sql-roles.ps1" -ForegroundColor Yellow
        }

        # ── Step 2: Choose use case or data source ──
        Write-Host ""
        & ./scripts/setup-data.ps1 -AllowDeployedFallback

        # ── Done ──
        Write-Host ""
        Write-Host "========================================" -ForegroundColor Green
        Write-Host "  Deployment complete!" -ForegroundColor Green
        Write-Host "========================================" -ForegroundColor Green
        $webUrl = azd env get-value SERVICE_FRONTEND_URI 2>$null
        if ($webUrl) {
          Write-Host ""
          Write-Host "  Open: $webUrl" -ForegroundColor Cyan
        }
        Write-Host ""
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: |
        # Write azd env values to .env so scripts can read them
        echo "Writing .env file..."
        azd env get-values 2>/dev/null | sed 's/^//' | sed 's/"//g' > .env

        echo ""
        echo "Preparing Python environment..."
        if [ ! -d venv ]; then
          python3 -m venv venv
        fi
        . ./venv/bin/activate
        python -m pip install --quiet --upgrade pip
        pip install --quiet -r requirements.txt

        echo ""
        echo "Setting up AI agent..."
        pwsh -File ./infra/scripts/setup-agent.ps1 || echo "WARNING: Agent setup failed — retry with: ./infra/scripts/setup-agent.ps1"

        echo ""
        echo "Granting API identity SQL access..."
        pwsh -File ./infra/scripts/setup-sql-roles.ps1 || echo "WARNING: SQL role assignment failed — retry with: ./infra/scripts/setup-sql-roles.ps1"

        echo ""
        pwsh -File ./scripts/setup-data.ps1 -AllowDeployedFallback

        echo ""
        echo "========================================"
        echo "  Deployment complete!"
        echo "========================================"
        WEB_URL=$(azd env get-value SERVICE_FRONTEND_URI 2>/dev/null)
        if [ -n "$WEB_URL" ]; then
          echo ""
          echo "  Open: $WEB_URL"
        fi
        echo ""
      continueOnError: false
      interactive: true
