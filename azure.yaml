# # yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# metadata:
#     template: azd-init@1.11.1
environment:
  name: conversation-knowledge-mining
  location: eastus
name: conversation-knowledge-mining

requiredVersions:
  azd: ">= 1.18.0 != 1.23.9"

metadata:
  template: conversation-knowledge-mining@1.0

hooks:
  preprovision:
    windows:
      run: |
        Write-Host ""
        Write-Host "  ---------------------------------------------------------------------------------------------------" -ForegroundColor Yellow
        Write-Host "  Note: If deployment fails or you encounter an issue, please open an issue with the deployment logs." -ForegroundColor Yellow
        Write-Host "  https://github.com/microsoft/Conversation-Knowledge-Mining-Solution-Accelerator/issues" -ForegroundColor Cyan
        Write-Host "  ---------------------------------------------------------------------------------------------------" -ForegroundColor Yellow
        Write-Host ""
      shell: pwsh
      interactive: true
    posix:
      run: |
        echo ""
        echo "\033[33m  ---------------------------------------------------------------------------------------------------\033[0m"
        echo "\033[33m  Note: If deployment fails or you encounter an issue, please open an issue with the deployment logs.\033[0m"
        echo "\033[36m  https://github.com/microsoft/Conversation-Knowledge-Mining-Solution-Accelerator/issues\033[0m"
        echo "\033[33m  ---------------------------------------------------------------------------------------------------\033[0m"
        echo ""
      shell: sh
      interactive: true
  postprovision:
    windows:
      run: |
        Write-Host "Web app URL: "
        Write-Host "$env:WEB_APP_URL" -ForegroundColor Cyan

        Write-Host "`nRun the following command in your Bash terminal to build the backend and frontend container images, push them to the provisioned Azure Container Registry, and update the App Services to use them:"
        Write-Host "bash ./infra/scripts/build_and_push_images.sh" -ForegroundColor Cyan

        Write-Host "`nCreate and activate a virtual environment if not already done, then run the following command in the bash terminal to create agents:"
        Write-Host "bash ./infra/scripts/run_create_agents_scripts.sh" -ForegroundColor Cyan
        Write-Host "`nRun the following command in your Bash terminal. It will grant the necessary permissions between resources and your user account, and also process and load the sample data into the application."
        Write-Host "bash ./infra/scripts/process_sample_data.sh" -ForegroundColor Cyan
      shell: pwsh
      continueOnError: false
      interactive: true
    posix:
      run: |
        echo "Web app URL: "
        echo $WEB_APP_URL

        echo "\nRun the following command in your Bash terminal to build the backend and frontend container images, push them to the provisioned Azure Container Registry, and update the App Services to use them:"
        echo "bash ./infra/scripts/build_and_push_images.sh"

        echo "\nCreate and activate a virtual environment if not already done, then run the following command in the bash terminal to create agents:"
        echo "bash ./infra/scripts/run_create_agents_scripts.sh"
        echo ""
        echo "\nRun the following command in your Bash terminal. It will grant the necessary permissions between resources and your user account, and also process and load the sample data into the application."
        echo "bash ./infra/scripts/process_sample_data.sh"
      shell: sh
      continueOnError: false
      interactive: true