# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: knowledge-mining-platform
metadata:
  template: knowledge-mining-platform

requiredVersions:
  azd: ">= 1.18.0"

services:
  backend:
    project: ./backend
    host: appservice
    language: python

  frontend:
    project: ./frontend
    host: appservice
    language: js

hooks:
  postprovision:
    windows:
      shell: pwsh
      run: |
        Write-Host ""
        Write-Host "Provisioning complete!" -ForegroundColor Green
        Write-Host "Frontend: $env:SERVICE_FRONTEND_URI" -ForegroundColor Cyan
        Write-Host "Backend:  $env:SERVICE_BACKEND_URI" -ForegroundColor Cyan
        Write-Host ""
        Write-Host "Next steps:" -ForegroundColor Yellow
        Write-Host "  1. Run: ./scripts/setup-agent.ps1    (create AI agent)"
        Write-Host "  2. Run: ./scripts/seed-data.ps1      (load sample data)"
        Write-Host ""
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: |
        echo ""
        echo "Provisioning complete!"
        echo "Frontend: $SERVICE_FRONTEND_URI"
        echo "Backend:  $SERVICE_BACKEND_URI"
        echo ""
        echo "Next steps:"
        echo "  1. Run: ./scripts/setup-agent.ps1    (create AI agent)"
        echo "  2. Run: ./scripts/seed-data.ps1      (load sample data)"
        echo ""
      continueOnError: false
      interactive: true

  postdeploy:
    shell: pwsh
    run: |
      Write-Host ""
      Write-Host "Deployment complete!" -ForegroundColor Green
      Write-Host "Frontend: $env:SERVICE_FRONTEND_URI" -ForegroundColor Cyan
      Write-Host "Backend:  $env:SERVICE_BACKEND_URI" -ForegroundColor Cyan
      Write-Host ""
