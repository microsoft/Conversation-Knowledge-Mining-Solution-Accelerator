# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: knowledge-mining-platform
metadata:
  template: knowledge-mining-platform

services:
  backend:
    project: ./backend
    host: containerapp
    language: python
    docker:
      path: ../backend/Dockerfile
      context: ..

  frontend:
    project: ./frontend
    host: containerapp
    language: js
    docker:
      path: Dockerfile
      context: .

hooks:
  preprovision:
    shell: pwsh
    run: |
      Write-Host "Provisioning Azure resources for Knowledge Mining Platform..."

  postprovision:
    shell: pwsh
    run: |
      # Set environment variables for the backend container app
      Write-Host "Configuring backend environment..."
      azd env set AZURE_OPENAI_ENDPOINT $env:AZURE_OPENAI_ENDPOINT
      azd env set AZURE_SEARCH_ENDPOINT $env:AZURE_SEARCH_ENDPOINT
      azd env set AZURE_CONTENT_UNDERSTANDING_ENDPOINT $env:AZURE_CONTENT_UNDERSTANDING_ENDPOINT
      azd env set AZURE_STORAGE_ACCOUNT $env:AZURE_STORAGE_ACCOUNT
      azd env set AZURE_SQL_SERVER $env:AZURE_SQL_SERVER
      azd env set AZURE_SQL_DATABASE $env:AZURE_SQL_DATABASE
      azd env set AZURE_COSMOS_ENDPOINT $env:AZURE_COSMOS_ENDPOINT
      Write-Host "Done."

  postdeploy:
    shell: pwsh
    run: |
      Write-Host ""
      Write-Host "Deployment complete!"
      Write-Host "Frontend: $env:SERVICE_FRONTEND_URI"
      Write-Host "Backend:  $env:SERVICE_BACKEND_URI"
      Write-Host ""
