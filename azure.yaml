# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: knowledge-mining-platform

requiredVersions:
  azd: ">= 1.18.0"

metadata:
  template: knowledge-mining@1.0

services:
  backend:
    project: ./backend
    host: appservice
    language: python
    docker:
      path: ../backend/Dockerfile
      context: ..

  frontend:
    project: ./frontend
    host: appservice
    language: js
    docker:
      path: Dockerfile
      context: .

hooks:
  postprovision:
    windows:
      shell: pwsh
      run: |
        # Write azd env values to .env so scripts can read them
        Write-Host "Writing .env file..." -ForegroundColor Yellow
        azd env get-values 2>$null | ForEach-Object {
          $_ -replace '^(\w+)="(.*)"$', '$1=$2'
        } | Where-Object { $_ -match '=' -and $_ -notmatch 'WARNING' } | Set-Content -Path ".env" -Encoding utf8

        Write-Host "Web app URL: "
        Write-Host "$env:WEB_APP_URL" -ForegroundColor Cyan

        Write-Host "`nNext steps:"
        Write-Host "  1. Run: ./scripts/setup-agent.ps1    (create AI agent)" -ForegroundColor Cyan
        Write-Host "  2. Run: ./scripts/seed-data.ps1      (load sample data)" -ForegroundColor Cyan
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: |
        # Write azd env values to .env so scripts can read them
        echo "Writing .env file..."
        azd env get-values 2>/dev/null | sed 's/^//' | sed 's/"//g' > .env

        echo "Web app URL: "
        echo $WEB_APP_URL

        echo "\nNext steps:"
        echo "  1. Run: ./scripts/setup-agent.ps1    (create AI agent)"
        echo "  2. Run: ./scripts/seed-data.ps1      (load sample data)"
      continueOnError: false
      interactive: true
